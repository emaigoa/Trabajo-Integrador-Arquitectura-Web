<!-- Se agregó la clase 'card-hover-effect' -->
<div class="card h-100 card-hover-effect">
  <img *ngIf="product.img" [src]="product.img" class="card-img-top" [alt]="product.name">
  <div class="card-body d-flex flex-column">
    <h6 class="card-title">{{ product.name }}</h6>
    <small class="text-muted">{{ product.category }}</small>

    <!-- Contenedor de precios con altura fija -->
    <div class="price-section">

      <!-- CASO 1: Promo 2x1 -->
      @if (is2x1()) {
        <span class="fw-bold text-dark">$ {{ product.price }}</span>
        <span class="badge bg-danger ms-1">2x1</span>
      }

      <!-- CASO 2: Descuento porcentual -->
      @else if (discountedPrice()) {
        <!-- Precio original tachado -->
        <span class="text-muted text-decoration-line-through">$ {{ product.price }}</span>
        <!-- Precio con descuento -->
        <span class="fw-bold text-dark">$ {{ discountedPrice() }}</span>
        <!-- Badge de descuento -->
        <span class="badge bg-danger ms-1">-{{ applicablePromo()?.discount }}%</span>
      }

      <!-- CASO 3: Sin promo -->
      @else {
        <span class="fw-bold text-dark">$ {{ product.price }}</span>
      }
    </div>

    <!-- Contenedor del botón (siempre en la misma posición) -->
    <div class="mt-auto button-container">
      <button class="btn btn-sm btn-success w-100" (click)="onAddClick($event)">Agregar</button>

      <!-- Elemento "+1" que se animará -->
      @if (showPlusOne()) {
        <span class="plus-one-animation">+1</span>
      }
    </div>
  </div>
</div>
