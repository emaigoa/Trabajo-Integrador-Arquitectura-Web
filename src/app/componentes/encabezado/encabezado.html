<nav class="navbar navbar-expand-lg bg-light border-bottom sticky-top">
  <div class="container">
    <a class="navbar-brand fw-bold" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
      <img src="./icon.png" alt="logo" width="24" height="24"> MiniMarket
    </a>

    <div class="ms-auto d-flex gap-3 align-items-center">
      <a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Inicio</a>

      <a class="nav-link position-relative" routerLink="/carrito" routerLinkActive="active">
        🛒 Carrito
        @if (cart.count() > 0) {
          <span class="badge text-bg-primary ms-1">{{ cart.count() }}</span>
        }
      </a>

      <!-- Zona de usuario -->
      @if (loggedIn) {
        <span class="navbar-text">
          Hola, <strong>{{ displayName || 'usuario' }}</strong>
        </span>
        <button class="btn btn-outline-secondary btn-sm" (click)="logout()">Salir</button>
      } @else {
        <button class="btn btn-primary btn-sm" (click)="login()">Iniciar sesión</button>
      }
    </div>
  </div>
</nav>
