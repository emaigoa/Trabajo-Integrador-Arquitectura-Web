<div class="login-container">

  <!-- Tarjeta del Formulario -->
  <div class="login-card">

    <h3>Simulación de Login</h3>

    <!-- Grupo de Formulario: Nombre -->
    <div class="form-group">
      <label for="username">Nombre de Usuario:</label>
      <input type="text"
             id="username"
             class="form-control"
             placeholder="Nombre Completo"
             [value]="username()"
             (input)="onUsernameChange($event)"
             required>
    </div>

    <!-- Grupo de Formulario: Email -->
    <div class="form-group">
      <label for="email">Email:</label>
      <input type="email"
             id="email"
             class="form-control"
             placeholder="ejemplo@correo.com"
             [value]="email()"
             (input)="onEmailChange($event)"
             required>
    </div>

    <!-- Mensaje de Error -->
    @if (errorMensaje()) {
      <div class="error-message">
        {{ errorMensaje() }}
      </div>
    }

    <!-- Botón de Envío -->
    <button (click)="submitLogin()" class="submit-button">
      Enviar
    </button>
  </div>

  <!-- Tarjeta de Éxito -->
  @if (mensaje()) {
    <div class="success-card">

      <!-- Icono SVG de Éxito -->
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="currentColor" class="success-icon" viewBox="0 0 16 16">
        <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/>
      </svg>

      <!-- Mensaje -->
      <h4>{{ mensaje() }}</h4>
      <p class="success-subtitle">Has ingresado los siguientes datos:</p>

      <!-- Lista de Datos -->
      <ul class="data-list">
        <li>
          <strong>Usuario Logueado:</strong>
          <span>{{ dataEnviada().username }}</span>
        </li>
        <li>
          <strong>Email:</strong>
          <span>{{ dataEnviada().email }}</span>
        </li>
      </ul>
    </div>
  }

</div>
